<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notebook Task Manager</title>
    <link rel="stylesheet" href="../styles/app.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Notebook</p>
          <h1>Task Manager</h1>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">◐</button>
          <a class="icon-button" href="../options/options.html" target="_blank" title="Open settings" aria-label="Open settings">⚙</a>
        </div>
      </header>

      <section class="dashboard" id="dashboard" aria-label="Task dashboard"></section>

      <section class="progress-wrap" aria-label="Completion progress">
        <div class="progress-meta">
          <span>Progress</span>
          <strong id="progressLabel">0%</strong>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </section>

      <section class="toolbar">
        <div class="field search-field">
          <span>⌕</span>
          <input id="searchInput" type="search" placeholder="Search tasks, notes, tags, URLs" autocomplete="off">
        </div>
        <select id="listSelect" aria-label="Task list"></select>
        <select id="sortSelect" aria-label="Sort tasks">
          <option value="manual">Manual</option>
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
          <option value="due">Due Time</option>
          <option value="recent">Recently Created</option>
        </select>
      </section>

      <section class="filter-row">
        <select id="dateFilter" aria-label="Filter by date">
          <option value="all">All Dates</option>
          <option value="today">Today</option>
          <option value="upcoming">Upcoming</option>
          <option value="overdue">Overdue</option>
          <option value="nodate">No Date</option>
          <option value="custom">Custom Date</option>
        </select>
        <input class="hidden" id="customDateFilter" type="date" aria-label="Choose custom filter date">
      </section>

      <section class="list-tools">
        <button class="secondary-button" id="addListBtn">＋ List</button>
        <button class="secondary-button danger-subtle" id="deleteListBtn">Delete List</button>
      </section>

      <section class="add-task-panel">
        <button class="add-task-toggle" id="addTaskToggle" type="button" aria-expanded="false">
          <span>＋</span>
          <strong>Add New Task</strong>
        </button>
      </section>

      <form class="task-form is-collapsed" id="taskForm">
        <div class="field">
          <input id="taskTitle" type="text" placeholder="New task title" autocomplete="off" required>
        </div>
        <div class="form-grid">
          <input id="taskDate" type="date" aria-label="Due date">
          <input id="taskTime" type="time" aria-label="Due time">
          <select id="taskPriority" aria-label="Priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
          <select id="taskReminder" aria-label="Reminder">
            <option value="5">5 min</option>
            <option value="10">10 min</option>
            <option value="30">30 min</option>
            <option value="60">1 hour</option>
            <option value="custom">Custom</option>
            <option value="0">None</option>
          </select>
        </div>
        <input class="hidden" id="customReminder" type="number" min="1" max="10080" placeholder="Custom minutes before">
        <textarea id="taskDescription" rows="2" placeholder="Optional description"></textarea>
        <div class="url-row">
          <input id="taskUrlTitle" type="text" placeholder="URL label">
          <input id="taskUrl" type="url" placeholder="Reference URL">
        </div>
        <div class="form-grid">
          <input id="taskTags" type="text" placeholder="Tags: work, design">
          <input id="taskColor" type="color" value="#4f8cff" aria-label="Color label">
        </div>
        <div class="form-actions">
          <button class="secondary-button" id="cancelTaskBtn" type="button">Cancel</button>
          <button class="primary-button" type="submit">Add Task</button>
        </div>
      </form>

      <section class="task-list" id="taskList" aria-live="polite"></section>

      <section class="backup-panel">
        <button class="secondary-button" id="exportBtn">Export JSON</button>
        <label class="secondary-button file-button">
          Import JSON
          <input id="importInput" type="file" accept="application/json">
        </label>
      </section>
    </main>

    <dialog class="task-dialog" id="taskDialog">
      <form method="dialog" class="dialog-card" id="editForm">
        <div class="dialog-header">
          <h2>Edit Task</h2>
          <button class="icon-button" value="cancel" aria-label="Close">×</button>
        </div>
        <input id="editTitle" type="text" required>
        <textarea id="editDescription" rows="3" placeholder="Description"></textarea>
        <div class="form-grid">
          <input id="editDate" type="date">
          <input id="editTime" type="time">
          <select id="editStatus" aria-label="Task status">
            <option value="pending">Pending</option>
            <option value="completed">Completed</option>
          </select>
          <select id="editPriority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-grid">
          <input id="editColor" type="color">
          <input id="editTags" type="text" placeholder="Tags">
        </div>
        <section class="completion-panel hidden" id="completionPanel">
          <h3>Completion Comment</h3>
          <select id="editCompletionPreset" aria-label="Completion comment preset">
            <option value="Completed">Default: Completed</option>
            <option value="Done">Done</option>
            <option value="Reviewed and completed">Reviewed and completed</option>
            <option value="custom">Other</option>
          </select>
          <textarea class="hidden" id="editCompletionComment" rows="2" placeholder="Write completion comment"></textarea>
        </section>

        <section>
          <h3>Notes</h3>
          <div id="commentsList" class="stack"></div>
          <textarea id="newComment" rows="2" placeholder="Write a note"></textarea>
          <button class="secondary-button" id="addCommentBtn" type="button">Add Note</button>
        </section>

        <section>
          <h3>Reference URLs</h3>
          <div id="urlsList" class="stack"></div>
          <div class="url-row">
            <input id="newUrlTitle" type="text" placeholder="Label">
            <input id="newUrl" type="url" placeholder="https://example.com">
          </div>
          <button class="secondary-button" id="addUrlBtn" type="button">Add URL</button>
        </section>

        <menu class="dialog-actions">
          <button class="secondary-button" value="cancel">Cancel</button>
          <button class="primary-button" id="saveEditBtn" value="default">Save</button>
        </menu>
      </form>
    </dialog>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
